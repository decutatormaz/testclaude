<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tris</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 24px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      background: linear-gradient(90deg, #e94560, #0f3460, #53d8fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: rgba(255,255,255,0.07);
      border-radius: 50px;
      padding: 4px;
      gap: 4px;
    }
    .mode-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      background: transparent;
      color: #94a3b8;
      transition: background 0.2s, color 0.2s;
    }
    .mode-btn.active {
      background: rgba(255,255,255,0.15);
      color: #e0e0e0;
    }

    /* ── Scoreboard ── */
    .scoreboard {
      display: flex;
      gap: 32px;
    }
    .score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .score-label {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .score-value {
      font-size: 2rem;
      font-weight: 700;
      transition: transform 0.15s;
    }
    .score-value.bump { transform: scale(1.4); }
    .score-value.x { color: #e94560; }
    .score-value.o { color: #53d8fb; }
    .score-value.d { color: #fbbf24; }

    /* ── Status ── */
    .status {
      font-size: 1.1rem;
      font-weight: 500;
      min-height: 1.6em;
      letter-spacing: 0.04em;
      transition: color 0.3s;
      text-align: center;
    }
    .status.win  { color: #4ade80; }
    .status.draw { color: #fbbf24; }
    .status.turn { color: #93c5fd; }

    /* ── Board ── */
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .cell {
      width: 85px;
      height: 85px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 700;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
      user-select: none;
      border: 2px solid rgba(255,255,255,0.07);
    }
    .cell:hover:not(.taken) {
      background: rgba(255,255,255,0.13);
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #53d8fb; }

    .cell.pop { animation: pop 0.25s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
    @keyframes pop {
      0%   { transform: scale(0.6); opacity: 0.4; }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .cell.winning {
      background: rgba(255,255,255,0.18);
      animation: pulse 0.7s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { box-shadow: 0 0 8px rgba(255,255,255,0.15); }
      to   { box-shadow: 0 0 24px rgba(255,255,255,0.4); }
    }

    /* ── Speed control (CPU vs CPU only) ── */
    .speed-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .speed-row input[type=range] {
      -webkit-appearance: none;
      width: 140px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      cursor: pointer;
    }
    .speed-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #53d8fb;
      cursor: pointer;
    }
    .speed-label { min-width: 3ch; text-align: right; color: #e0e0e0; font-weight: 600; }

    /* ── Game counter (CPU vs CPU) ── */
    .game-counter {
      font-size: 0.82rem;
      color: #64748b;
      letter-spacing: 0.06em;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 11px 30px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn:hover  { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: linear-gradient(135deg, #e94560, #c23152);
      color: #fff;
      box-shadow: 0 4px 18px rgba(233,69,96,0.4);
    }
    .btn-primary:hover { box-shadow: 0 8px 24px rgba(233,69,96,0.5); }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.16); }
    .btn[disabled] { opacity: 0.4; pointer-events: none; }

    .hidden { display: none !important; }

    @media (max-width: 420px) {
      .cell { width: 64px; height: 64px; font-size: 1.6rem; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>TRIS</h1>

  <!-- Mode selector -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnModeHuman">👤 Tu vs CPU</button>
    <button class="mode-btn"       id="btnModeCpu">🤖 CPU vs CPU</button>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-block">
      <span class="score-label" id="labelX">Tu (X)</span>
      <span class="score-value x" id="scoreX">0</span>
    </div>
    <div class="score-block">
      <span class="score-label">Pareggi</span>
      <span class="score-value d" id="scoreDraw">0</span>
    </div>
    <div class="score-block">
      <span class="score-label" id="labelO">CPU (O)</span>
      <span class="score-value o" id="scoreO">0</span>
    </div>
  </div>

  <div class="game-counter hidden" id="gameCounter">Partita #1</div>

  <div class="status turn" id="status">Il tuo turno (X)</div>

  <!-- Speed control -->
  <div class="speed-row hidden" id="speedRow">
    <span>Velocità</span>
    <input type="range" id="speedSlider" min="1" max="5" value="3">
    <span class="speed-label" id="speedLabel">3</span>
  </div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
    <div class="cell" data-i="9"></div>
    <div class="cell" data-i="10"></div>
    <div class="cell" data-i="11"></div>
    <div class="cell" data-i="12"></div>
    <div class="cell" data-i="13"></div>
    <div class="cell" data-i="14"></div>
    <div class="cell" data-i="15"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btnNew">Nuova partita</button>
    <button class="btn btn-secondary hidden" id="btnAutoplay">▶ Auto-play</button>
  </div>
</div>

<script>
  // Tris valido solo su righe e colonne (griglia 4x4, 3 in fila)
  const WINS = [
    // righe
    [0,1,2],[1,2,3],
    [4,5,6],[5,6,7],
    [8,9,10],[9,10,11],
    [12,13,14],[13,14,15],
    // colonne
    [0,4,8],[4,8,12],
    [1,5,9],[5,9,13],
    [2,6,10],[6,10,14],
    [3,7,11],[7,11,15]
  ];
  const SIZE = 16;
  const MAX_DEPTH = 4;

  // ── State ────────────────────────────────────────────────
  let board, gameOver, busy;
  let mode = 'human';          // 'human' | 'cpu'
  let autoplay = false;
  let autoplayTimer = null;
  let gamesPlayed = 0;
  let score = { X: 0, O: 0, D: 0 };

  // ── DOM refs ─────────────────────────────────────────────
  const cells        = Array.from(document.querySelectorAll('.cell'));
  const statusEl     = document.getElementById('status');
  const btnNew       = document.getElementById('btnNew');
  const btnAutoplay  = document.getElementById('btnAutoplay');
  const btnModeHuman = document.getElementById('btnModeHuman');
  const btnModeCpu   = document.getElementById('btnModeCpu');
  const speedRow     = document.getElementById('speedRow');
  const speedSlider  = document.getElementById('speedSlider');
  const speedLabel   = document.getElementById('speedLabel');
  const gameCounter  = document.getElementById('gameCounter');
  const labelX       = document.getElementById('labelX');
  const labelO       = document.getElementById('labelO');

  // ── Heuristica per depth limit ────────────────────────────
  function evaluate(b) {
    let score = 0;
    for (const [a, c, d] of WINS) {
      const vals = [b[a], b[c], b[d]];
      const oN = vals.filter(v => v === 'O').length;
      const xN = vals.filter(v => v === 'X').length;
      if (oN > 0 && xN > 0) continue;
      if      (oN === 2) score += 5;
      else if (oN === 1) score += 1;
      if      (xN === 2) score -= 5;
      else if (xN === 1) score -= 1;
    }
    return score;
  }

  // ── Minimax con depth limit e alpha-beta ──────────────────
  function minimax(b, player, alpha, beta, depth) {
    const result = checkWinner(b);
    if (result) {
      if (result.draw)           return 0;
      if (result.winner === 'O') return  100 - depth;
      return depth - 100;
    }
    if (depth >= MAX_DEPTH) return evaluate(b);

    const opponent = player === 'O' ? 'X' : 'O';

    if (player === 'O') {           // maximizing
      let best = -Infinity;
      for (let i = 0; i < SIZE; i++) {
        if (!b[i]) {
          b[i] = player;
          best = Math.max(best, minimax(b, opponent, alpha, beta, depth + 1));
          b[i] = null;
          alpha = Math.max(alpha, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    } else {                        // minimizing (X)
      let best = Infinity;
      for (let i = 0; i < SIZE; i++) {
        if (!b[i]) {
          b[i] = player;
          best = Math.min(best, minimax(b, opponent, alpha, beta, depth + 1));
          b[i] = null;
          beta = Math.min(beta, best);
          if (beta <= alpha) break;
        }
      }
      return best;
    }
  }

  // Best move for given player (with random tie-breaking for variety)
  function bestMove(b, player) {
    const sign = player === 'O' ? 1 : -1;
    const opponent = player === 'O' ? 'X' : 'O';
    let bestScore = -Infinity, bestMoves = [];

    for (let i = 0; i < SIZE; i++) {
      if (!b[i]) {
        b[i] = player;
        const s = sign * minimax(b, opponent, -Infinity, Infinity, 1);
        b[i] = null;
        if (s > bestScore) { bestScore = s; bestMoves = [i]; }
        else if (s === bestScore) bestMoves.push(i);
      }
    }
    return bestMoves[Math.floor(Math.random() * bestMoves.length)] ?? -1;
  }

  // ── Helpers ───────────────────────────────────────────────
  function checkWinner(b) {
    for (const [a, c, d] of WINS) {
      if (b[a] && b[a] === b[c] && b[a] === b[d])
        return { winner: b[a], line: [a, c, d] };
    }
    if (b.every(v => v)) return { winner: null, line: null, draw: true };
    return null;
  }

  function stepDelay() {
    const v = +speedSlider.value;          // 1–5
    return [900, 600, 380, 200, 80][v - 1];
  }

  function renderCell(i, val) {
    const el = cells[i];
    el.textContent = val || '';
    el.className = 'cell' + (val ? ` taken ${val.toLowerCase()}` : '');
    if (val) {
      el.classList.add('pop');
      el.addEventListener('animationend', () => el.classList.remove('pop'), { once: true });
    }
  }

  function highlightWin(line) {
    line.forEach(i => cells[i].classList.add('winning'));
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = `status ${cls}`;
  }

  function bumpScore(id) {
    const el = document.getElementById(id);
    el.classList.add('bump');
    el.addEventListener('transitionend', () => el.classList.remove('bump'), { once: true });
  }

  function endGame(result) {
    gameOver = true;
    busy     = false;

    if (result.draw) {
      score.D++;
      setStatus('Pareggio!', 'draw');
      bumpScore('scoreDraw');
    } else if (result.winner === 'X') {
      score.X++;
      highlightWin(result.line);
      setStatus(mode === 'human' ? 'Hai vinto! 🎉' : 'Vince X!', 'win');
      bumpScore('scoreX');
    } else {
      score.O++;
      highlightWin(result.line);
      setStatus(mode === 'human' ? 'Ha vinto la CPU!' : 'Vince O!', 'win');
      bumpScore('scoreO');
    }

    document.getElementById('scoreX').textContent    = score.X;
    document.getElementById('scoreO').textContent    = score.O;
    document.getElementById('scoreDraw').textContent = score.D;

    if (autoplay) {
      autoplayTimer = setTimeout(newGame, Math.max(stepDelay() * 2, 600));
    }
  }

  // ── Human vs CPU ──────────────────────────────────────────
  function playerMove(i) {
    if (mode !== 'human' || gameOver || busy || board[i]) return;
    board[i] = 'X';
    renderCell(i, 'X');

    const result = checkWinner(board);
    if (result) { endGame(result); return; }

    setStatus('CPU sta pensando…', 'turn');
    busy = true;

    setTimeout(() => {
      const mv = bestMove(board, 'O');
      if (mv === -1) return;
      board[mv] = 'O';
      renderCell(mv, 'O');
      busy = false;

      const res2 = checkWinner(board);
      if (res2) { endGame(res2); return; }
      setStatus('Il tuo turno (X)', 'turn');
    }, 420);
  }

  // ── CPU vs CPU ────────────────────────────────────────────
  // currentTurn: 'X' | 'O'
  let currentTurn;

  function scheduleCpuTurn() {
    if (gameOver || mode !== 'cpu') return;
    busy = true;
    setTimeout(doCpuTurn, stepDelay());
  }

  function doCpuTurn() {
    if (gameOver) return;
    const mv = bestMove(board, currentTurn);
    if (mv === -1) return;

    board[mv] = currentTurn;
    renderCell(mv, currentTurn);

    const result = checkWinner(board);
    if (result) { endGame(result); return; }

    currentTurn = currentTurn === 'X' ? 'O' : 'X';
    setStatus(currentTurn === 'X' ? 'Turno di X (minimax)' : 'Turno di O (minimax)', 'turn');
    scheduleCpuTurn();
  }

  // ── New game ──────────────────────────────────────────────
  function newGame() {
    clearTimeout(autoplayTimer);
    board       = Array(SIZE).fill(null);
    gameOver    = false;
    busy        = false;
    currentTurn = 'X';
    gamesPlayed++;

    cells.forEach(el => { el.textContent = ''; el.className = 'cell'; });
    gameCounter.textContent = `Partita #${gamesPlayed}`;

    if (mode === 'human') {
      setStatus('Il tuo turno (X)', 'turn');
    } else {
      setStatus('Turno di X (minimax)', 'turn');
      scheduleCpuTurn();
    }
  }

  // ── Mode switching ────────────────────────────────────────
  function setMode(m) {
    clearTimeout(autoplayTimer);
    autoplay = false;
    btnAutoplay.textContent = '▶ Auto-play';
    mode = m;
    score = { X: 0, O: 0, D: 0 };
    document.getElementById('scoreX').textContent    = 0;
    document.getElementById('scoreO').textContent    = 0;
    document.getElementById('scoreDraw').textContent = 0;
    gamesPlayed = 0;

    if (m === 'human') {
      btnModeHuman.classList.add('active');
      btnModeCpu.classList.remove('active');
      labelX.textContent = 'Tu (X)';
      labelO.textContent = 'CPU (O)';
      speedRow.classList.add('hidden');
      gameCounter.classList.add('hidden');
      btnAutoplay.classList.add('hidden');
      cells.forEach(el => el.style.cursor = '');
    } else {
      btnModeCpu.classList.add('active');
      btnModeHuman.classList.remove('active');
      labelX.textContent = 'Agente X';
      labelO.textContent = 'Agente O';
      speedRow.classList.remove('hidden');
      gameCounter.classList.remove('hidden');
      btnAutoplay.classList.remove('hidden');
      cells.forEach(el => el.style.cursor = 'default');
    }
    newGame();
  }

  // ── Event listeners ───────────────────────────────────────
  cells.forEach(el => el.addEventListener('click', () => playerMove(+el.dataset.i)));

  btnNew.addEventListener('click', () => {
    autoplay = false;
    btnAutoplay.textContent = '▶ Auto-play';
    newGame();
  });

  btnAutoplay.addEventListener('click', () => {
    autoplay = !autoplay;
    btnAutoplay.textContent = autoplay ? '⏸ Pausa' : '▶ Auto-play';
    if (autoplay && gameOver) newGame();
  });

  btnModeHuman.addEventListener('click', () => { if (mode !== 'human') setMode('human'); });
  btnModeCpu.addEventListener('click',   () => { if (mode !== 'cpu')   setMode('cpu');   });

  speedSlider.addEventListener('input', () => {
    speedLabel.textContent = speedSlider.value;
  });

  // ── Init ──────────────────────────────────────────────────
  newGame();
</script>
</body>
</html>
